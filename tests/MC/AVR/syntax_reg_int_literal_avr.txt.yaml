test_cases:
  -
    input:
      bytes: [ 0x0f, 0x0c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "add r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x0c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "add r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x0f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "add r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x0f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "add r31, r16"
