test_cases:
  -
    input:
      bytes: [ 0x0f, 0x28 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "or r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x28 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "or r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x2b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "or r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x2b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "or r31, r16"
