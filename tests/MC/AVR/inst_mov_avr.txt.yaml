      bytes: [ 0x5f, 0x2e ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "mov r5, r31"

  -
    input:
      bytes: [ 0x33, 0x2c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "mov r3, r3"
