test_cases:
  -
    input:
      bytes: [ 0x1d, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 3, 5"

  -
    input:
      bytes: [ 0x09, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 1, 1"

  -
    input:
      bytes: [ 0x3a, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 7, 2"

  -
    input:
      bytes: [ 0x00, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 0, 0"

  -
    input:
      bytes: [ 0x07, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 0, 7"

  -
    input:
      bytes: [ 0xf8, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 31, 0"

  -
    input:
      bytes: [ 0xff, 0x9a ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbi 31, 7"
