test_cases:
  -
    input:
      bytes: [ 0x0f, 0x1c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "adc r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x1c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "adc r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x1f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "adc r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x1f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "adc r31, r16"
