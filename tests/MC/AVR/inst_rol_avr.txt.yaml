test_cases:
  -
    input:
      bytes: [ 0xff, 0x1f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "rol r31"

  -
    input:
      bytes: [ 0x99, 0x1f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "rol r25"

  -
    input:
      bytes: [ 0x55, 0x1c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "rol r5"

  -
    input:
      bytes: [ 0x00, 0x1c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "rol r0"
