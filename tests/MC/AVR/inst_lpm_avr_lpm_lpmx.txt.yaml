test_cases:
  -
    input:
      bytes: [ 0xc8, 0x95 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm"

  -
    input:
      bytes: [ 0x34, 0x90 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm r3, Z"

  -
    input:
      bytes: [ 0x74, 0x91 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm r23, Z"

  -
    input:
      bytes: [ 0x85, 0x90 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm r8, Z+"

  -
    input:
      bytes: [ 0x05, 0x90 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm r0, Z+"

  -
    input:
      bytes: [ 0xf5, 0x91 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "lpm", "lpmx" ]
    expected:
      insns:
        -
          asm_text: "lpm r31, Z+"
