test_cases:
  -
    input:
      bytes: [ 0x0f, 0x9c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "mul" ]
    expected:
      insns:
        -
          asm_text: "mul r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x9c ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "mul" ]
    expected:
      insns:
        -
          asm_text: "mul r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x9f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "mul" ]
    expected:
      insns:
        -
          asm_text: "mul r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x9f ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "mul" ]
    expected:
      insns:
        -
          asm_text: "mul r31, r16"
