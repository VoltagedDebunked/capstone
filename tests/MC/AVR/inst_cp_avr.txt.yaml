test_cases:
  -
    input:
      bytes: [ 0xc2, 0x14 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "cp r12, r2"

  -
    input:
      bytes: [ 0x30, 0x15 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "cp r19, r0"

  -
    input:
      bytes: [ 0xff, 0x16 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "cp r15, r31"

  -
    input:
      bytes: [ 0x00, 0x14 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "cp r0, r0"
