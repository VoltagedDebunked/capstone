test_cases:
  -
    input:
      bytes: [ 0xe8, 0x95 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "spm", "spmx" ]
    expected:
      insns:
        -
          asm_text: "spm"

  -
    input:
      bytes: [ 0xf8, 0x95 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr", "spm", "spmx" ]
    expected:
      insns:
        -
          asm_text: "spm Z+"
