test_cases:
  -
    input:
      bytes: [ 0x0f, 0x24 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "eor r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x24 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "eor r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x27 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "eor r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x27 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "eor r31, r16"
