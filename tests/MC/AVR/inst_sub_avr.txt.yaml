test_cases:
  -
    input:
      bytes: [ 0x0f, 0x18 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sub r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x18 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sub r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x1b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sub r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x1b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sub r31, r16"
