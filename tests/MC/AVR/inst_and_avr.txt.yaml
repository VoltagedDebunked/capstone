test_cases:
  -
    input:
      bytes: [ 0x0f, 0x20 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "and r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x20 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "and r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x23 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "and r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x23 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "and r31, r16"
