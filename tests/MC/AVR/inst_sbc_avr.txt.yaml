test_cases:
  -
    input:
      bytes: [ 0x0f, 0x08 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbc r0, r15"

  -
    input:
      bytes: [ 0xf0, 0x08 ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbc r15, r0"

  -
    input:
      bytes: [ 0x0f, 0x0b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbc r16, r31"

  -
    input:
      bytes: [ 0xf0, 0x0b ]
      arch: "CS_ARCH_AVR"
      options: [ "avr" ]
    expected:
      insns:
        -
          asm_text: "sbc r31, r16"
